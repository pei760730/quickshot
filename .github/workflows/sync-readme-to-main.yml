name: Sync README to main

on:
  push:
    branches:
      - 'claude/**'
    paths:
      - 'README.md'

jobs:
  sync-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Copy README to main
        run: |
          set -e
          # 取得當前分支的 README 內容
          cp README.md /tmp/README.md

          # 切到 main
          git checkout main

          # 覆蓋 README
          cp /tmp/README.md README.md

          # 檢查是否有差異
          if git diff --quiet README.md; then
            echo "README unchanged, skipping"
            exit 0
          fi

          # commit & push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: sync README from ${{ github.ref_name }} [skip ci]"
          git push origin main
