name: Engine Version Check

on:
  pull_request:

jobs:
  engine-version-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run engine version protocol guard
        run: python scripts/engine/engine_version_check.py --base origin/main --head HEAD
