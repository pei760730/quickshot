name: Lint + Test

# 不設 paths 過濾 — rules-lint 跑得快（<10s）、pytest <5s、值得每 PR 都跑
on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Run Ruff (critical rules)
        run: ruff check --select E9,F63,F7,F82 scripts tests

      - name: Run rules cross-file lint (CI mode)
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: python scripts/lint/rules-lint.py --ci

      - name: Run brand-ref lint
        run: python scripts/lint/brand_ref_lint.py

      - name: Run unit tests
        run: python -m pytest tests/ -v

      - name: Validate JSON data integrity
        run: python scripts/ops/video-ops.py validate-all
